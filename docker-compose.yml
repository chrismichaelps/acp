# Persistent, single-user ACP host for daily-driver use.
#
# Boots the reference ACP host from the production image with durable SQLite
# storage on a named volume, so work, leases, events, memory, artifacts,
# checkpoints, and reviews survive `docker compose restart`. Drive it from your
# terminal with ./bin/acp (which runs the compiled CLI inside this container).
#
#   docker compose up -d --build   # start the host
#   ./bin/acp workspace create ...  # use it
#   docker compose down             # stop (data kept in the volume)
#   docker compose down -v          # stop and wipe all state
services:
  acp:
    build: .
    image: acp:latest
    container_name: acp-host
    ports:
      - '4317:4317'
    environment:
      # local profile, single-user: no bearer tokens needed — mutations run as
      # worker_system. Flip ACP_REQUIRE_AUTH=true for real session bootstrap.
      ACP_PORT: '4317'
      ACP_PROFILE: local
      ACP_REQUIRE_AUTH: 'false'
      ACP_REQUIRE_WORKSPACE_BINDINGS: 'false'
      # Durable file storage on the mounted volume below.
      ACP_STORAGE_ADAPTER: sqlite
      ACP_SQLITE_PATH: /data/acp.sqlite
    volumes:
      - acp-data:/data
    restart: unless-stopped

volumes:
  acp-data:

# ACP host for terminal-first feature work — two selectable Compose profiles.
#
#   sqlite (default daily-driver): one container, durable SQLite on a volume.
#     npm run acp:up          # docker compose --profile sqlite up -d --build
#
#   ha (Postgres + pg-notify): the ADR-0008 self-host-ha stack — network-durable
#   storage and cross-replica event fan-out, ready to scale to multiple hosts.
#     npm run acp:ha:up       # docker compose --profile ha up -d --build
#
# Run one profile at a time (both hosts publish 4317). Drive either with ./bin/acp
# — the wrapper auto-detects whichever host service is running. Both keep the
# local single-user posture (auth off → mutations as worker_system); flip
# ACP_REQUIRE_AUTH/ACP_REQUIRE_WORKSPACE_BINDINGS to true for the full hosted
# security posture.
services:
  # ---- default: single-container SQLite daily-driver ----
  acp:
    profiles: ['sqlite']
    build: .
    image: acp:latest
    container_name: acp-host
    ports:
      - '4317:4317'
    environment:
      ACP_PORT: '4317'
      ACP_PROFILE: local
      ACP_REQUIRE_AUTH: 'false'
      ACP_REQUIRE_WORKSPACE_BINDINGS: 'false'
      ACP_STORAGE_ADAPTER: sqlite
      ACP_SQLITE_PATH: /data/acp.sqlite
    volumes:
      - acp-data:/data
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      # Plain-HTTP router on :80 (no tls — a router with a TLS section serves
      # HTTPS only, which would 404 plain HTTP and break the :80 smoke check).
      - 'traefik.http.routers.acp.rule=Host(`acp.localhost`)'
      - 'traefik.http.routers.acp.entrypoints=web'
      - 'traefik.http.routers.acp.service=acp'
      - 'traefik.http.routers.acp.middlewares=acp-ratelimit@file,acp-compress@file,acp-headers@file'
      # HTTPS router on :443 (self-signed default cert), same backing service.
      - 'traefik.http.routers.acp-secure.rule=Host(`acp.localhost`)'
      - 'traefik.http.routers.acp-secure.entrypoints=websecure'
      - 'traefik.http.routers.acp-secure.tls=true'
      - 'traefik.http.routers.acp-secure.service=acp'
      - 'traefik.http.routers.acp-secure.middlewares=acp-ratelimit@file,acp-compress@file,acp-headers@file'
      - 'traefik.http.services.acp.loadbalancer.server.port=4317'

  # ---- ha: Postgres-backed host with pg-notify event fan-out ----
  db:
    profiles: ['ha']
    image: postgres:16-alpine
    container_name: acp-postgres
    environment:
      POSTGRES_USER: acp
      POSTGRES_PASSWORD: acp
      POSTGRES_DB: acp
    volumes:
      - acp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acp -d acp']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  acp-ha:
    profiles: ['ha']
    build: .
    image: acp:latest
    depends_on:
      db:
        condition: service_healthy
    # The first replica keeps 4317 for bin/acp; the range gives scaled replicas
    # unique host bindings while Traefik uses their internal 4317 endpoints.
    ports:
      - target: 4317
        published: '4317-4326'
        protocol: tcp
    environment:
      ACP_PORT: '4317'
      # self-host-ha preset selects postgres + pg-notify; auth stays off here for
      # frictionless single-user terminal use (override to true for production).
      ACP_PROFILE: self-host-ha
      ACP_REQUIRE_AUTH: 'false'
      ACP_REQUIRE_WORKSPACE_BINDINGS: 'false'
      ACP_STORAGE_ADAPTER: postgres
      ACP_EVENT_BROKER: pg-notify
      ACP_DATABASE_URL: postgres://acp:acp@db:5432/acp
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      # Plain-HTTP router on :80 (no tls — a router with a TLS section serves
      # HTTPS only, which would 404 plain HTTP and break the :80 smoke check).
      - 'traefik.http.routers.acp.rule=Host(`acp.localhost`)'
      - 'traefik.http.routers.acp.entrypoints=web'
      - 'traefik.http.routers.acp.service=acp'
      - 'traefik.http.routers.acp.middlewares=acp-ratelimit@file,acp-compress@file,acp-headers@file'
      # HTTPS router on :443 (self-signed default cert), same backing service.
      - 'traefik.http.routers.acp-secure.rule=Host(`acp.localhost`)'
      - 'traefik.http.routers.acp-secure.entrypoints=websecure'
      - 'traefik.http.routers.acp-secure.tls=true'
      - 'traefik.http.routers.acp-secure.service=acp'
      - 'traefik.http.routers.acp-secure.middlewares=acp-ratelimit@file,acp-compress@file,acp-headers@file'
      - 'traefik.http.services.acp.loadbalancer.server.port=4317'

  # ---- edge: Traefik reverse proxy (overlay on either base profile) ----
  traefik:
    profiles: ['edge']
    image: traefik:v3.1
    container_name: acp-traefik
    ports:
      - '80:80'
      - '443:443'
      - '127.0.0.1:8080:8080'
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  acp-data:
  acp-pgdata:

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validation:
    name: Local Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Check env example
        run: pnpm check:env

      - name: Check edge runtime pins
        run: pnpm check:edge-runtime-pins

      - name: Typecheck
        run: pnpm typecheck

      - name: Check file size
        run: pnpm check:file-size

      - name: Test
        run: pnpm test

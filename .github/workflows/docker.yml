# Docker guard: proves the production image and both Compose profiles work on a
# Docker-capable runner every PR. Separate from ci.yml (Local Gates) because it
# needs a Docker daemon and is slower.
name: Docker

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docker-cli-dogfood:
    name: Docker-hosted CLI dogfood
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Builds the image, runs the host, drives the compiled CLI inside the
      # container through the full lifecycle, and asserts the event sequence.
      - name: Run docker-cli dogfood
        run: node scripts/acp-docker-cli-dogfood.mjs

  ha-profile-smoke:
    name: Postgres/HA profile durability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Start the HA stack (Postgres + pg-notify)
        run: docker compose --profile ha up -d --build

      - name: Wait for the HA host to become healthy
        run: |
          for _ in $(seq 1 60); do
            status="$(docker inspect -f '{{.State.Health.Status}}' acp-host-ha 2>/dev/null || echo none)"
            if [ "$status" = healthy ]; then exit 0; fi
            sleep 3
          done
          echo "acp-host-ha did not become healthy"
          docker compose --profile ha logs
          exit 1

      - name: Drive the CLI and prove Postgres durability across a restart
        run: |
          id_of() { node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).id))"; }
          ws="$(./bin/acp workspace create --name ci-ha --kind git_repository --uri file:///repo | id_of)"
          wk="$(./bin/acp work create 'CI HA smoke' --workspace "$ws" --priority high | id_of)"
          echo "created work $wk in workspace $ws"

          docker compose --profile ha restart acp-ha
          for _ in $(seq 1 60); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' acp-host-ha 2>/dev/null)" = healthy ] && break
            sleep 3
          done

          got="$(./bin/acp work get "$wk" | id_of)"
          if [ "$got" != "$wk" ]; then
            echo "state not durable across restart: got '$got', expected '$wk'"
            exit 1
          fi
          echo "Postgres-backed state survived restart: $wk"

      - name: Tear down
        if: always()
        run: docker compose --profile ha down -v

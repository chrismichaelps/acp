# Docker guard: proves the production image and both Compose profiles work on a
# Docker-capable runner every PR. Separate from ci.yml (Local Gates) because it
# needs a Docker daemon and is slower.
name: Docker

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docker-cli-dogfood:
    name: Docker-hosted CLI dogfood
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Builds the image, runs the host, drives the compiled CLI inside the
      # container through the full lifecycle, and asserts the event sequence.
      - name: Run docker-cli dogfood
        run: node scripts/acp-docker-cli-dogfood.mjs

  ha-profile-smoke:
    name: Postgres/HA profile durability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run HA dogfood
        run: node scripts/acp-docker-ha-dogfood.mjs

  edge-smoke:
    name: Traefik edge profile smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run edge smoke test
        run: node scripts/acp-docker-edge-smoke.mjs
